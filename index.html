<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Valoración del Adulto Mayor — UAA Enfermería</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/estilos.css">
  <script src="scripts/navegacion.js" defer></script>
  <script src="scripts/autenticacion.js" defer></script>
</head>
<body>

<!-- ==================================================
     PANTALLA 1: LOGIN
================================================== -->
<div id="login" class="pantalla activa">
  <div class="login-card">

    <!-- Logo UAA SVG -->
    <svg class="login-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#003087" stroke="#C8962A" stroke-width="3"/>
      <text x="50" y="42" text-anchor="middle" fill="white" font-family="Montserrat,sans-serif" font-size="18" font-weight="bold">UAA</text>
      <text x="50" y="62" text-anchor="middle" fill="#C8962A" font-family="Montserrat,sans-serif" font-size="8" font-weight="600">ENFERMERÍA</text>
      <text x="50" y="74" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Montserrat,sans-serif" font-size="6">Ciencias de la Salud</text>
    </svg>

    <h2>Sistema de Valoración</h2>
    <p>Adulto Mayor — Departamento de Enfermería</p>

    <!-- Selector de rol (para el prototipo) -->
    <select id="rolSelect">
      <option value="">-- Seleccione su rol --</option>
      <option value="estudiante">Estudiante</option>
      <option value="profesor">Profesor</option>
      <option value="coordinador">Coordinación / Jefe de Departamento</option>
    </select>

    <input type="text" id="inputId" placeholder="Matrícula / ID de empleado" />
    <input type="password" placeholder="Contraseña" />

    <div class="confidencialidad-check">
      <input type="checkbox" id="checkConf" />
      <label for="checkConf">
        He leído y acepto el aviso de confidencialidad y el manejo de datos personales conforme a la LGPDPPSO.
      </label>
    </div>

    <button class="btn-primary" onclick="iniciarSesion()">INGRESAR</button>
  </div>
</div>
